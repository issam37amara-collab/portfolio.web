<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Very Important Question 💌</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:    #e8526a;
      --rose-dk: #c03050;
      --blush:   #fce8ec;
      --cream:   #fff9f5;
      --muted:   #a0828a;
      --gray:    #d4c0c5;
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'Lato', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── floating hearts bg ── */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .hb {
      position: absolute;
      font-size: 1.4rem;
      opacity: 0;
      animation: floatUp var(--d) var(--delay) infinite ease-in;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-110vh) scale(0.6); opacity: 0; }
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border: 1.5px solid var(--gray);
      border-radius: 28px;
      padding: 3.5rem 3rem 3rem;
      max-width: 440px;
      width: 92vw;
      text-align: center;
      box-shadow: 0 8px 40px rgba(232,82,106,0.10);
    }

    .emoji { font-size: 3.2rem; display: block; margin-bottom: 1.2rem; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.12); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: #2c1a1e;
      line-height: 1.25;
      margin-bottom: 0.55rem;
    }
    .sub {
      font-size: 0.88rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-bottom: 2.4rem;
    }

    /* ── button wrapper (fixed height so card doesn't jump) ── */
    .btn-area {
      position: relative;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      padding: 0 2rem;
      height: 48px;
      border-radius: 50px;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn:active { transform: scale(0.96); }

    #yesBtn {
      background: var(--rose);
      color: #fff;
      box-shadow: 0 4px 18px rgba(232,82,106,0.38);
      position: relative;
      z-index: 2;
    }
    #yesBtn:hover { background: var(--rose-dk); box-shadow: 0 6px 24px rgba(192,48,80,0.42); }

    #noBtn {
      background: var(--blush);
      color: var(--rose-dk);
      border: 1.5px solid var(--gray);
      position: absolute;
      left: 50%;
      transform: translateX(80px);
      z-index: 1;
      transition: left 0.12s ease, top 0.12s ease, opacity 0.4s;
      white-space: nowrap;
    }

    /* ── love screen ── */
    #loveScreen {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .big-heart {
      font-size: 5rem;
      display: block;
      margin-bottom: 1rem;
      animation: popIn 0.5s cubic-bezier(.36,2,.6,1) forwards;
    }
    @keyframes popIn {
      0%   { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    #loveScreen h1 { color: var(--rose); }
    #loveScreen .sub { margin-bottom: 1.8rem; }

    .again-btn {
      font-size: 0.8rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.04em;
    }
    .again-btn:hover { color: var(--rose); }

    /* confetti */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 1.2s ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(60vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- floating hearts -->
  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">

    <!-- Question screen -->
    <div id="questionScreen">
      <span class="emoji">🥺</span>
      <h1>Do you love me?</h1>
      <p class="sub">Think very carefully…</p>

      <div class="btn-area" id="btnArea">
        <button class="btn" id="yesBtn" onclick="sayYes()">Yes 💖</button>
        <button class="btn" id="noBtn"
          onmouseenter="runAway()"
          ontouchstart="runAway()">No 🙅</button>
      </div>

      <p id="tease" style="margin-top:1.2rem; font-size:0.78rem; color:var(--muted); min-height:1em; letter-spacing:0.04em;"></p>
    </div>

    <!-- Love screen -->
    <div id="loveScreen">
      <span class="big-heart">💕</span>
      <h1>I love you too!</h1>
      <p class="sub">I knew you'd say yes 🥰</p>
      <button class="again-btn" onclick="resetAll()">ask again?</button>
    </div>

  </div>

<script>
  /* ── floating hearts background ── */
  const bg = document.getElementById('heartsBg');
  const symbols = ['♥','♡','💗','💓'];
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('span');
    h.className = 'hb';
    h.textContent = symbols[i % symbols.length];
    h.style.setProperty('--d',     (6 + Math.random() * 8) + 's');
    h.style.setProperty('--delay', (Math.random() * 8) + 's');
    h.style.left   = (Math.random() * 100) + 'vw';
    h.style.bottom = '-5vh';
    h.style.color  = `hsl(${340 + Math.random()*30},${70+Math.random()*20}%,${60+Math.random()*20}%)`;
    bg.appendChild(h);
  }

  /* ── runaway No button ── */
  const noBtn  = document.getElementById('noBtn');
  const area   = document.getElementById('btnArea');
  const tease  = document.getElementById('tease');
  let attempts = 0;
  const teases = [
    'Nice try 😏',
    'Not so fast! 😄',
    'You can\'t escape 😇',
    'Almost… 🙈',
    'Give up yet? 😂',
  ];

  function runAway() {
    attempts++;
    const aw = area.offsetWidth;
    const bw = noBtn.offsetWidth;
    const maxLeft = aw - bw;

    // random position within the card width
    const newLeft = Math.floor(Math.random() * maxLeft);
    noBtn.style.position  = 'absolute';
    noBtn.style.left      = newLeft + 'px';
    noBtn.style.transform = 'none';

    // random vertical jitter inside btn-area
    const bh = area.offsetHeight;
    const nh = noBtn.offsetHeight;
    const newTop = Math.floor(Math.random() * Math.max(1, bh - nh));
    noBtn.style.top = newTop + 'px';

    tease.textContent = teases[Math.min(attempts - 1, teases.length - 1)];

    if (attempts >= 6) {
      noBtn.style.opacity = '0';
      noBtn.style.pointerEvents = 'none';
      tease.textContent = 'The "No" button has fled the scene 😂';
    }
  }

  /* ── Yes handler ── */
  function sayYes() {
    document.getElementById('questionScreen').style.display = 'none';
    const ls = document.getElementById('loveScreen');
    ls.style.display = 'flex';
    spawnConfetti();
  }

  /* ── Confetti ── */
  const colors = ['#e8526a','#f7a8b8','#ffcc00','#a8d8ea','#b5ead7','#ffd6e0'];
  function spawnConfetti() {
    for (let i = 0; i < 60; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left            = (10 + Math.random() * 80) + 'vw';
        c.style.top             = (Math.random() * 30) + 'vh';
        c.style.background      = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDelay  = (Math.random() * 0.4) + 's';
        c.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
        document.body.appendChild(c);
        c.addEventListener('animationend', () => c.remove());
      }, i * 18);
    }
  }

  /* ── Reset ── */
  function resetAll() {
    attempts = 0;
    noBtn.style.opacity        = '1';
    noBtn.style.pointerEvents  = 'auto';
    noBtn.style.left           = '50%';
    noBtn.style.top            = '';
    noBtn.style.transform      = 'translateX(80px)';
    tease.textContent          = '';
    document.getElementById('loveScreen').style.display      = 'none';
    document.getElementById('questionScreen').style.display  = 'block';
  }
</script>
</body>
</html>
